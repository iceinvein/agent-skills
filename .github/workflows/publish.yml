name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun test

      - run: bun build src/cli/index.ts --outdir dist/cli --target node

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish with npm 11 (bypasses broken bundled npm)
        run: |
          curl -sL https://registry.npmjs.org/npm/-/npm-11.12.1.tgz | tar xz
          node package/bin/npm-cli.js publish --provenance --access public
